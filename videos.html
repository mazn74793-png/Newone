<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Make Future | Videos</title>
  <style>
    :root{color-scheme:dark}
    body{margin:0;font-family:system-ui;background:#0b1020;color:#e8ecff;min-height:100vh;padding:20px}
    .card{max-width:1050px;margin:0 auto;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:18px;box-shadow:0 10px 40px rgba(0,0,0,.35)}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between}
    .logo{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#7c3aed,#06b6d4);display:grid;place-items:center;font-weight:900}
    a,button{cursor:pointer;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.08);color:#fff;padding:10px 14px;border-radius:12px;text-decoration:none;font-weight:800}
    .box{background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:14px;margin-top:12px}
    .muted{opacity:.82;font-size:13px;line-height:1.6}
    iframe{width:100%;aspect-ratio:16/9;border:0;border-radius:14px}
    .v{border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.22);border-radius:16px;padding:14px;margin-top:10px}
  </style>
</head>
<body>
  <div class="card">
    <div class="row">
      <div class="row" style="justify-content:flex-start">
        <div class="logo">MF</div>
        <div>
          <div style="font-size:18px;font-weight:900">الفيديوهات</div>
          <div class="muted" id="sub">...</div>
        </div>
      </div>
      <div class="row">
        <a href="student.html">رجوع</a>
        <a href="https://wa.me/201210575530" target="_blank" rel="noreferrer">واتساب الدعم</a>
      </div>
    </div>

    <div id="state" class="box">Loading…</div>
    <div id="list"></div>
  </div>

<script type="module">
  import { supabase } from "./supabase-client.js";

  const me = JSON.parse(localStorage.getItem("mf_user") || "null");
  const c = JSON.parse(localStorage.getItem("mf_selected_course") || "null");
  if(!me) location.href="login.html";
  if(!c) location.href="student.html";

  document.getElementById("sub").textContent = `الكورس: ${c.title} — ${c.subject}`;

  const state = document.getElementById("state");
  const list = document.getElementById("list");

  // check approved payment
  const { data: pay, error: payErr } = await supabase
    .from("payments")
    .select("*")
    .eq("user_id", me.id)
    .eq("course_id", c.id)
    .order("id", {ascending:false})
    .limit(1);

  if(payErr){ state.textContent = payErr.message; throw payErr; }

  const p = pay?.[0];
  if(!p || p.status !== "approved"){
    state.innerHTML = `
      <div class="muted">
        الفيديوهات مقفولة لحد ما الأدمن يوافق الدفع.<br>
        روح صفحة الدفع وسجل رقم العملية، أو كلمنا واتساب.
      </div>
      <div class="row" style="margin-top:10px">
        <a href="payment.html">صفحة الدفع</a>
      </div>
    `;
  } else {
    state.innerHTML = `<div class="muted">✅ الدفع Approved — الفيديوهات مفتوحة.</div>`;

    const { data: vids, error: vErr } = await supabase
      .from("video_library")
      .select("*")
      .eq("grade", c.grade)
      .eq("subject", c.subject)
      .eq("is_active", true)
      .order("order_index", {ascending:true});

    if(vErr){ state.textContent = vErr.message; throw vErr; }

    if(!vids || vids.length===0){
      list.innerHTML = `<div class="box"><div class="muted">مفيش فيديوهات لسه.</div></div>`;
    } else {
      list.innerHTML = "";
      vids.forEach(v=>{
        const div = document.createElement("div");
        div.className = "v";
        div.innerHTML = `
          <div style="font-weight:900">${esc(v.title)}</div>
          <div class="muted" style="margin:6px 0 10px">${esc(v.grade)} — ${esc(v.subject)}</div>
          <iframe src="${ytEmbed(v.youtube_url)}" allowfullscreen></iframe>
        `;
        list.appendChild(div);
      });
    }
  }

  function ytEmbed(url){
    try{
      const u = new URL(url);
      if(u.hostname.includes("youtu.be")) return "https://www.youtube.com/embed/" + u.pathname.replace("/","");
      const id = u.searchParams.get("v");
      if(id) return "https://www.youtube.com/embed/" + id;
      if(u.pathname.includes("/embed/")) return url;
      return url;
    }catch{return url;}
  }
  function esc(s){ return String(s||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;"); }
</script>
</body>
</html>
