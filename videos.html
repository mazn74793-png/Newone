<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Make Future | Videos</title>

  <link rel="stylesheet" href="./theme.css" />
  <script src="./theme.js" defer></script>

  <style>
    body{margin:0;min-height:100vh}
    .wrap{max-width:980px;margin:auto;padding:18px}
    .top{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
    .brand{display:flex;align-items:center;gap:10px}
    .logo{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:grid;place-items:center;color:#fff;font-weight:900}
    .btn{cursor:pointer;border:1px solid var(--border);background:var(--btn);color:var(--text);padding:10px 12px;border-radius:12px;font-weight:900;text-decoration:none}
    .card{margin-top:14px;border:1px solid var(--border);background:var(--card);border-radius:18px;padding:16px;box-shadow:0 12px 40px rgba(0,0,0,.18)}
    .muted{opacity:.82;font-size:13px;line-height:1.7}
    .list{display:grid;gap:10px;margin-top:12px}
    .item{display:flex;gap:10px;align-items:center;justify-content:space-between;border:1px solid var(--border);background:rgba(0,0,0,.10);border-radius:14px;padding:12px}
    .pill{font-size:12px;opacity:.9;border:1px solid rgba(255,255,255,.14);border-radius:999px;padding:6px 10px;background:rgba(0,0,0,.12)}
  </style>
</head>

<body>
  <div class="wrap">
    <div class="top">
      <div class="brand">
        <div class="logo">MF</div>
        <div>
          <div style="font-weight:900;font-size:18px">الفيديوهات</div>
          <div class="muted" id="head">...</div>
        </div>
      </div>
      <a class="btn" href="student.html">رجوع</a>
    </div>

    <div class="card">
      <div style="font-weight:900">مكتبة الفيديو</div>
      <div class="muted">المحتوى بيظهر حسب السنة + المادة (من الكورس المختار أو أول كورس متاح).</div>
      <div class="list" id="list"></div>
    </div>
  </div>

  <script type="module">
    import { supabase } from "./supabase-client.js";

    const me = JSON.parse(localStorage.getItem("mf_user") || "null");
    if(!me) location.href="login.html";

    const list = document.getElementById("list");
    const head = document.getElementById("head");

    function esc(s){ return String(s ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;"); }

    // نحدد المادة من كورس مختار، ولو مش موجود نجيب أول كورس Active للسنة
    let chosen = JSON.parse(localStorage.getItem("mf_selected_course") || "null");

    if(!chosen){
      const { data } = await supabase
        .from("courses")
        .select("id,grade,supject,title,is_active")
        .eq("grade", me.grade)
        .eq("is_active", true)
        .order("id", { ascending:false })
        .limit(1);
      chosen = data?.[0] || null;
    }

    if(!chosen){
      head.textContent = `${me.grade} • مفيش كورسات لسه`;
      list.innerHTML = `<div class="muted" style="margin-top:10px">مفيش فيديوهات لأن مفيش كورسات للسنة دي.</div>`;
    }else{
      const supject = chosen.supject ?? chosen.subject ?? "";
      head.textContent = `${me.grade} • ${supject}`;

      const { data, error } = await supabase
        .from("video_library")
        .select("id,title,youtube_url,order_index,is_active,grade,supject")
        .eq("grade", chosen.grade)
        .eq("supject", supject)
        .eq("is_active", true)
        .order("order_index", { ascending:true });

      if(error){
        list.innerHTML = `<div class="muted" style="margin-top:10px">خطأ: ${esc(error.message)}</div>`;
      }else if(!data || data.length===0){
        list.innerHTML = `<div class="muted" style="margin-top:10px">مفيش فيديوهات Active للمادة دي لسه.</div>`;
      }else{
        list.innerHTML = "";
        data.forEach(v=>{
          const row = document.createElement("div");
          row.className="item";
          row.innerHTML = `
            <div>
              <div style="font-weight:900">${esc(v.title)}</div>
              <div class="muted">ترتيب: <span class="pill">${esc(v.order_index)}</span></div>
            </div>
            <a class="btn" href="${esc(v.youtube_url)}" target="_blank" rel="noreferrer">فتح</a>
          `;
          list.appendChild(row);
        });
      }
    }
  </script>
</body>
</html>
