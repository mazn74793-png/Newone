<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Make Future | Login</title>

<style>

body{
margin:0;
font-family:system-ui;
background:#0b1020;
color:#fff;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
}

.card{
background:#12172e;
padding:30px;
border-radius:15px;
width:420px;
box-shadow:0 0 30px rgba(0,0,0,.5);
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:none;
background:#1a2040;
color:#fff;
}

button{
margin-top:15px;
padding:10px;
width:100%;
border:none;
border-radius:10px;
background:#5a6cff;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#7887ff;
}

.status{
margin-top:10px;
font-size:14px;
opacity:.8;
}

</style>
</head>

<body>

<div class="card">

<h2>تسجيل طالب جديد</h2>

<input id="name" placeholder="اسم الطالب">

<input id="phone" placeholder="موبايل الطالب">

<input id="parent" placeholder="موبايل ولي الامر">

<input id="password" type="password" placeholder="كلمة المرور">

<button onclick="signup()">تسجيل</button>

<div class="status" id="status"></div>

<hr style="margin:20px 0">

<h2>تسجيل الدخول</h2>

<input id="loginPhone" placeholder="موبايل الطالب">

<input id="loginPass" type="password" placeholder="كلمة المرور">

<button onclick="login()">دخول</button>

<div class="status" id="loginStatus"></div>

</div>


<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
"https://anlstahxxpbbfnwrwulu.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFubHN0YWh4eHBiYmZud3J3dWx1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NDQzMTIsImV4cCI6MjA4ODEyMDMxMn0.4RQxQ4AZZCVCswTRdJoZ7Jz9qNwQq0fPs7vitnMJ3A4"
)

function phoneToEmail(phone){

const clean = String(phone).replace(/\D/g,"")

return clean + "@makefuture.com"

}


window.signup = async function(){

const name = document.getElementById("name").value
const phone = document.getElementById("phone").value
const parent = document.getElementById("parent").value
const pass = document.getElementById("password").value

const email = phoneToEmail(phone)

const {data,error} = await supabase.auth.signUp({
email:email,
password:pass
})

if(error){
document.getElementById("status").innerText = error.message
return
}

await supabase.from("profiles").insert({
id:data.user.id,
full_name:name,
phone_student:phone,
phone_parent:parent
})

document.getElementById("status").innerText="تم التسجيل بنجاح"

location.href="student.html"

}



window.login = async function(){

const phone = document.getElementById("loginPhone").value
const pass = document.getElementById("loginPass").value

const email = phoneToEmail(phone)

const {error} = await supabase.auth.signInWithPassword({
email:email,
password:pass
})

if(error){
document.getElementById("loginStatus").innerText = error.message
return
}

document.getElementById("loginStatus").innerText="تم تسجيل الدخول"

location.href="student.html"

}

</script>


</body>
</html>
