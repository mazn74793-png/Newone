<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Make Future | Login</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
  --accent:#7c3aed;
  --accent2:#06b6d4;
  --text:#f1f5f9;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:'Cairo',sans-serif;
  background:linear-gradient(135deg,#0f172a,#111827);
  color:var(--text);
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:20px;
}

.container{
  width:100%;
  max-width:400px;
  background:var(--card);
  padding:30px;
  border-radius:20px;
  box-shadow:0 20px 50px rgba(0,0,0,.5);
}

.logo{
  text-align:center;
  font-weight:900;
  font-size:24px;
  margin-bottom:20px;
  background:linear-gradient(45deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.tabs{
  display:flex;
  margin-bottom:20px;
}

.tabs button{
  flex:1;
  padding:10px;
  background:none;
  border:none;
  color:white;
  font-weight:bold;
  cursor:pointer;
  border-bottom:2px solid transparent;
}

.tabs button.active{
  border-color:var(--accent2);
}

input,select{
  width:100%;
  padding:10px;
  margin-bottom:12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.1);
  background:#0f172a;
  color:white;
}

button.main{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:linear-gradient(45deg,var(--accent),var(--accent2));
  color:white;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

.link{
  text-align:center;
  font-size:13px;
  margin-top:10px;
  cursor:pointer;
  opacity:.7;
}

.link:hover{
  opacity:1;
}

.form{
  display:none;
}

.form.active{
  display:block;
}
</style>
</head>

<body>

<div class="container">
  <div class="logo">Make Future</div>

  <div class="tabs">
    <button id="loginTab" class="active" onclick="switchTab('login')">Login</button>
    <button id="signupTab" onclick="switchTab('signup')">Sign Up</button>
  </div>

  <!-- LOGIN -->
  <div id="loginForm" class="form active">
    <input id="li_identity" placeholder="موبايل أو Username" />
    <input id="li_password" type="password" placeholder="Password" />
    <button class="main" onclick="login()">دخول</button>
    <div class="link" onclick="resetPassword()">نسيت الباسورد؟</div>
  </div>

  <!-- SIGNUP -->
  <div id="signupForm" class="form">
    <input id="su_full_name" placeholder="اسم الطالب" />
    <input id="su_phone_student" placeholder="موبايل الطالب" />
    <input id="su_phone_parent" placeholder="موبايل ولي الأمر" />
    <select id="su_grade">
      <option value="3prep">3 إعدادي</option>
      <option value="1sec">1 ثانوي</option>
      <option value="2sec">2 ثانوي</option>
      <option value="3sec">3 ثانوي</option>
    </select>
    <input id="su_username" placeholder="Username (اختياري)" />
    <input id="su_password" type="password" placeholder="Password" />
    <button class="main" onclick="signup()">تسجيل</button>
  </div>
</div>

<script type="module">
import { supabase } from "./supabase-client.js";

window.switchTab = function(type){
  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  document.querySelectorAll(".form").forEach(f=>f.classList.remove("active"));

  if(type==="login"){
    loginTab.classList.add("active");
    loginForm.classList.add("active");
  } else {
    signupTab.classList.add("active");
    signupForm.classList.add("active");
  }
}

window.signup = async function(){
  const full_name = su_full_name.value;
  const phone_student = su_phone_student.value;
  const phone_parent = su_phone_parent.value;
  const grade = su_grade.value;
  const username = su_username.value || null;
  const password = su_password.value;

  const { data, error } = await supabase
    .from("users")
    .insert([{ full_name, phone_student, phone_parent, grade, username, password }])
    .select()
    .single();

  if(error){ alert(error.message); return; }

  localStorage.setItem("mf_user", JSON.stringify(data));
  location.href="student.html";
}

window.login = async function(){
  const identity = li_identity.value;
  const password = li_password.value;

  let query = supabase.from("users").select("*").limit(1);

  if(identity.startsWith("01")){
    query = query.eq("phone_student", identity);
  } else {
    query = query.eq("username", identity);
  }

  const { data } = await query.maybeSingle();

  if(!data){ alert("الحساب غير موجود"); return; }
  if(data.password !== password){ alert("باسورد غلط"); return; }

  localStorage.setItem("mf_user", JSON.stringify(data));
  location.href="student.html";
}

window.resetPassword = function(){
  const phone = prompt("اكتب رقم موبايلك:");
  if(!phone) return;

  alert("حاليًا تواصل مع الدعم على واتساب لإعادة تعيين الباسورد.");
  window.open("https://wa.me/201210575530","_blank");
}
</script>

</body>
</html>
