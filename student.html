<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Make Future | Student</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
  --accent:#7c3aed;
  --accent2:#06b6d4;
  --text:#f1f5f9;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Cairo',sans-serif;
  background:linear-gradient(135deg,#0f172a,#111827);
  color:var(--text);
  min-height:100vh;
}

/* Navbar */
.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:rgba(0,0,0,.4);
  backdrop-filter:blur(10px);
  position:sticky;
  top:0;
}

.logo{
  font-weight:900;
  font-size:20px;
  background:linear-gradient(45deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.nav button{
  background:var(--accent);
  border:none;
  padding:8px 15px;
  border-radius:12px;
  color:white;
  font-weight:bold;
}

/* Hero */
.hero{
  text-align:center;
  padding:40px 20px;
}

.hero h1{
  font-size:28px;
  margin:0;
}

.hero p{
  opacity:.7;
  margin-top:10px;
}

/* Grid */
.container{
  padding:20px;
  max-width:1100px;
  margin:auto;
}

.grid{
  display:grid;
  gap:15px;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
}

/* Card */
.card{
  background:var(--card);
  padding:20px;
  border-radius:18px;
  transition:.3s;
  border:1px solid rgba(255,255,255,.05);
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 10px 30px rgba(0,0,0,.4);
}

.card h3{
  margin:0 0 10px;
}

.card button{
  margin-top:10px;
  width:100%;
  background:linear-gradient(45deg,var(--accent),var(--accent2));
  border:none;
  padding:10px;
  border-radius:12px;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.status{
  margin-top:15px;
  padding:10px;
  border-radius:12px;
  background:rgba(255,255,255,.05);
  font-size:13px;
}

@media(max-width:500px){
  .hero h1{font-size:22px}
}
</style>
</head>

<body>

<div class="nav">
  <div class="logo">Make Future</div>
  <button onclick="logout()">خروج</button>
</div>

<div class="hero">
  <h1 id="welcome"></h1>
  <p>اختر الكورس المناسب وابدأ رحلتك</p>
</div>

<div class="container">
  <div class="grid" id="courses"></div>
</div>

<script type="module">
import { supabase } from "./supabase-client.js";

const user = JSON.parse(localStorage.getItem("mf_user"));
if(!user) location.href="login.html";

document.getElementById("welcome").innerText = "أهلاً " + user.full_name;

async function loadCourses(){
  const { data } = await supabase
    .from("courses")
    .select("*")
    .eq("grade", user.grade)
    .eq("is_active", true);

  const container = document.getElementById("courses");
  container.innerHTML="";

  data.forEach(c=>{
    const div = document.createElement("div");
    div.className="card";
    div.innerHTML=`
      <h3>${c.title}</h3>
      <div>المادة: ${c.subject}</div>
      <div>المدرس: ${c.teacher_name}</div>
      <div>السعر: ${c.price} جنيه</div>
      <button onclick='selectCourse(${JSON.stringify(c)})'>اختيار الكورس</button>
    `;
    container.appendChild(div);
  });
}

window.selectCourse=function(course){
  localStorage.setItem("mf_selected_course",JSON.stringify(course));
  location.href="payment.html";
}

window.logout=function(){
  localStorage.removeItem("mf_user");
  location.href="login.html";
}

loadCourses();
</script>

</body>
</html>
