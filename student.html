<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Make Future | Student</title>
  <style>
    :root{color-scheme:dark}
    body{margin:0;font-family:system-ui;background:#0b1020;color:#e8ecff;min-height:100vh;padding:20px}
    .card{max-width:1100px;margin:0 auto;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:18px;box-shadow:0 10px 40px rgba(0,0,0,.35)}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between}
    .logo{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#7c3aed,#06b6d4);display:grid;place-items:center;font-weight:900}
    a,button{cursor:pointer;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.08);color:#fff;padding:10px 14px;border-radius:12px;text-decoration:none;font-weight:800}
    a:hover,button:hover{background:rgba(255,255,255,.14);transform:translateY(-1px)}
    .muted{opacity:.82;font-size:13px;line-height:1.6}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
    @media (max-width:980px){.grid{grid-template-columns:1fr}}
    .box{background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:14px}
    table{width:100%;border-collapse:collapse;margin-top:10px}
    th,td{border-bottom:1px solid rgba(255,255,255,.12);padding:10px;font-size:13px;vertical-align:top}
    th{text-align:right;opacity:.85}
    select{padding:10px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.06);color:#fff}
    .hr{height:1px;background:linear-gradient(to right,transparent,rgba(255,255,255,.14),transparent);margin:14px 0}
  </style>
</head>
<body>
  <div class="card">
    <div class="row">
      <div class="row" style="justify-content:flex-start">
        <div class="logo">MF</div>
        <div>
          <div style="font-size:18px;font-weight:900">صفحة الطالب</div>
          <div class="muted" id="hello">...</div>
        </div>
      </div>
      <div class="row">
        <a href="index.html">الرئيسية</a>
        <a href="payment.html">الدفع</a>
        <a href="videos.html">الفيديوهات</a>
        <button onclick="logout()">خروج</button>
      </div>
    </div>

    <div class="grid">
      <div class="box">
        <div style="font-weight:900">اختيار السنة</div>
        <div class="row" style="margin-top:10px">
          <select id="gradeSel">
            <option value="3prep">3 إعدادي</option>
            <option value="1sec">1 ثانوي</option>
            <option value="2sec">2 ثانوي</option>
            <option value="3sec">3 ثانوي</option>
          </select>
          <button onclick="loadCourses()">عرض الكورسات</button>
        </div>

        <div class="hr"></div>

        <div style="font-weight:900">الكورسات</div>
        <table>
          <thead>
            <tr>
              <th>الكورس</th>
              <th>المدرس</th>
              <th>المادة</th>
              <th>السعر</th>
              <th>اختيار</th>
            </tr>
          </thead>
          <tbody id="coursesBody"></tbody>
        </table>
      </div>

      <div class="box">
        <div style="font-weight:900">الكورس المختار</div>
        <div class="muted" id="selectedInfo" style="margin-top:8px">لسه مفيش كورس</div>

        <div class="row" style="margin-top:12px">
          <button onclick="goPay()">ادفع للكورس ده</button>
          <button onclick="goVideos()">🎥 الفيديوهات</button>
          <a href="https://wa.me/201210575530" target="_blank" rel="noreferrer">دعم واتساب</a>
        </div>

        <div class="hr"></div>

        <div style="font-weight:900">مواعيد الكورس</div>
        <table>
          <thead>
            <tr>
              <th>اليوم</th>
              <th>من</th>
              <th>إلى</th>
              <th>ملاحظات</th>
            </tr>
          </thead>
          <tbody id="schedBody"></tbody>
        </table>

        <div class="hr"></div>

        <div style="font-weight:900">حالة الدفع</div>
        <div class="muted" id="payStatus" style="margin-top:8px">—</div>
      </div>
    </div>
  </div>

<script type="module">
  import { supabase } from "./supabase-client.js";

  const me = JSON.parse(localStorage.getItem("mf_user") || "null");
  if(!me) location.href = "login.html";

  const hello = document.getElementById("hello");
  const gradeSel = document.getElementById("gradeSel");
  const coursesBody = document.getElementById("coursesBody");
  const selectedInfo = document.getElementById("selectedInfo");
  const schedBody = document.getElementById("schedBody");
  const payStatus = document.getElementById("payStatus");

  hello.textContent = `أهلاً ${me.full_name} — (${me.grade})`;

  gradeSel.value = me.grade;

  let selectedCourse = JSON.parse(localStorage.getItem("mf_selected_course") || "null");
  if(selectedCourse){
    renderSelected();
    await loadSchedules();
    await refreshPaymentStatus();
  }

  window.logout = function(){
    localStorage.removeItem("mf_user");
    location.href = "login.html";
  }

  window.loadCourses = async function(){
    const grade = gradeSel.value;
    const { data, error } = await supabase
      .from("courses")
      .select("*")
      .eq("grade", grade)
      .eq("is_active", true)
      .order("id", { ascending:false });

    if(error){ alert(error.message); return; }

    coursesBody.innerHTML = "";
    if(!data || data.length === 0){
      coursesBody.innerHTML = `<tr><td colspan="5">مفيش كورسات لسه.</td></tr>`;
      return;
    }

    data.forEach(c=>{
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td><b>${esc(c.title)}</b></td>
        <td>${esc(c.teacher_name)}</td>
        <td>${esc(c.subject)}</td>
        <td>${esc(c.price)}</td>
        <td><button onclick='selectCourse(${JSON.stringify(c)})'>اختيار</button></td>
      `;
      coursesBody.appendChild(tr);
    });
  }

  window.selectCourse = async function(course){
    selectedCourse = course;
    localStorage.setItem("mf_selected_course", JSON.stringify(course));
    renderSelected();
    await loadSchedules();
    await refreshPaymentStatus();
  }

  function renderSelected(){
    if(!selectedCourse){
      selectedInfo.textContent = "لسه مفيش كورس";
      return;
    }
    selectedInfo.innerHTML = `
      <b>${esc(selectedCourse.title)}</b><br>
      ${esc(selectedCourse.subject)} — ${esc(selectedCourse.teacher_name)} — السعر: <b>${esc(selectedCourse.price)}</b>
    `;
  }

  async function loadSchedules(){
    schedBody.innerHTML = `<tr><td colspan="4">Loading…</td></tr>`;
    const { data, error } = await supabase
      .from("schedules")
      .select("*")
      .eq("course_id", selectedCourse.id)
      .order("id", {ascending:false});

    if(error){ schedBody.innerHTML = `<tr><td colspan="4">${esc(error.message)}</td></tr>`; return; }

    schedBody.innerHTML = "";
    if(!data || data.length === 0){
      schedBody.innerHTML = `<tr><td colspan="4">مفيش مواعيد للكورس ده لسه.</td></tr>`;
      return;
    }
    data.forEach(s=>{
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${esc(s.day_of_week)}</td>
        <td>${esc(s.start_time)}</td>
        <td>${esc(s.end_time)}</td>
        <td>${esc(s.notes || "")}</td>
      `;
      schedBody.appendChild(tr);
    });
  }

  async function refreshPaymentStatus(){
    if(!selectedCourse){ payStatus.textContent = "اختار كورس الأول."; return; }

    payStatus.textContent = "Loading…";
    const { data, error } = await supabase
      .from("payments")
      .select("*")
      .eq("user_id", me.id)
      .eq("course_id", selectedCourse.id)
      .order("id", { ascending:false })
      .limit(1);

    if(error){ payStatus.textContent = error.message; return; }
    const p = data?.[0];
    if(!p){ payStatus.textContent = "مفيش طلب دفع للكورس ده لسه."; return; }

    payStatus.innerHTML = `آخر حالة: <b>${esc(p.status)}</b> — ${esc(p.method)} — ${esc(p.created_at)}`;
  }

  window.goPay = function(){
    if(!selectedCourse){ alert("اختار كورس الأول"); return; }
    location.href = "payment.html";
  }
  window.goVideos = function(){
    if(!selectedCourse){ alert("اختار كورس الأول"); return; }
    location.href = "videos.html";
  }

  function esc(s){ return String(s||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;"); }

  // auto load
  await loadCourses();
</script>
</body>
</html>
