<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Make Future | Student</title>
  <style>
    :root{color-scheme:dark}
    body{margin:0;font-family:system-ui;background:#0b1020;color:#e8ecff;min-height:100vh;padding:18px}
    .card{max-width:820px;margin:0 auto;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:18px}
    button,a{cursor:pointer;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.08);color:#fff;padding:10px 14px;border-radius:12px;text-decoration:none;font-weight:800}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .muted{opacity:.82;font-size:13px;line-height:1.6}
    pre{background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.12);padding:12px;border-radius:12px;overflow:auto}
  </style>
</head>
<body>
  <div class="card">
    <div class="row" style="justify-content:space-between">
      <div>
        <div style="font-weight:900;font-size:18px">لوحة الطالب</div>
        <div class="muted">دي صفحة اختبار للتأكد إن الـ Login شغال.</div>
      </div>
      <div class="row">
        <a href="index.html">الرئيسية</a>
        <a href="login.html">تسجيل/دخول</a>
        <button id="btnLogout">خروج</button>
      </div>
    </div>

    <div style="margin-top:12px" class="muted" id="status">جارٍ التحميل…</div>
    <pre id="out" style="margin-top:12px"></pre>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const supabase = createClient(
      "https://anlstahxxpbbfnwrwulu.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFubHN0YWh4eHBiYmZud3J3dWx1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NDQzMTIsImV4cCI6MjA4ODEyMDMxMn0.4RQxQ4AZZCVCswTRdJoZ7Jz9qNwQq0fPs7vitnMJ3A4"
    );

    const status = document.getElementById("status");
    const out = document.getElementById("out");

    document.getElementById("btnLogout").onclick = async () => {
      await supabase.auth.signOut();
      location.href = "login.html";
    };

    (async () => {
      const { data } = await supabase.auth.getSession();
      const session = data.session;

      if (!session) {
        status.textContent = "مش مسجل دخول — هرّجعك لصفحة login.";
        setTimeout(() => location.href = "login.html", 800);
        return;
      }

      status.textContent = "مسجل دخول ✅ هجيب بياناتك من profiles…";

      const uid = session.user.id;

      const { data: profile, error } = await supabase
        .from("profiles")
        .select("*")
        .eq("id", uid)
        .single();

      if (error) {
        status.textContent = "في Error في قراءة profiles: " + error.message;
        out.textContent = JSON.stringify({ uid }, null, 2);
        return;
      }

      status.textContent = "تمام ✅ دي بياناتك:";
      out.textContent = JSON.stringify(profile, null, 2);
    })();
  </script>
</body>
</html>
