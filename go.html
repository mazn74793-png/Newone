<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Make Future | Go</title>
<style>
  :root{color-scheme:dark}
  body{margin:0;font-family:system-ui;background:#0b1020;color:#e8ecff;min-height:100vh;display:grid;place-items:center}
  .box{max-width:520px;padding:18px;border-radius:16px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);text-align:center}
  .muted{opacity:.8;font-size:13px;line-height:1.7}
</style>
</head>
<body>
  <div class="box">
    <h3 style="margin:0 0 8px">جاري التحويل…</h3>
    <div class="muted">لو التحويل ما حصلش خلال ثانيتين، ارجع للرئيسية وجرب تاني.</div>
  </div>

<script>
  const me = JSON.parse(localStorage.getItem("mf_user") || "null");

  if(!me){
    location.replace("login.html");
  } else if(me.role === "superadmin"){
    location.replace("admin.html");
  } else {
    location.replace("student.html");
  }
</script>
</body>
</html>
